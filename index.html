<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Valampir Bapa ni 202mi janmajayanti poster</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#111;
    font-family:sans-serif;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:20px;
    color:white;
}

.controls{
    width:850px;
    max-width:95%;
    background:#1f1f1f;
    padding:20px;
    border-radius:20px;
    margin-bottom:20px;
}

.controls h2{
    margin-bottom:15px;
}

.controls input,
.controls textarea,
.controls button{
    width:100%;
    margin-top:12px;
    padding:14px;
    border:none;
    border-radius:12px;
    font-size:16px;
}

.controls textarea{
    resize:none;
    height:70px;
}

.controls button{
    background:gold;
    color:black;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.controls button:hover{
    transform:scale(1.02);
}

.poster-container{
    position:relative;
    width:850px;
    max-width:95%;
}

#poster{
    width:100%;
    display:block;
    border-radius:20px;
}

/* ROUND IMAGE FRAME */

.photo-frame{
    position:absolute;

    left:85px;
    bottom:68px;

    width:175px;
    height:172px;

    border-radius:50%;
    overflow:hidden;

    border:6px solid #d6a84f;

    background:#5a0000;

    box-shadow:
    0 0 10px rgba(255,215,0,0.8),
    0 0 30px rgba(255,215,0,0.4);
}

.photo-frame img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* CUSTOM TEXT */

.custom-text{
    position:absolute;

    left:270px;
    bottom:58px;

    width:320px;
    height:60px;

    display:flex;
    align-items:center;
    justify-content:left;

    color:#ffc42f;
    font-size:26px;
  
    text-align:center;

    padding:5px;
}

/* MOBILE */

@media(max-width:768px){

    .photo-frame{
        left:10.2%;
        bottom:3.9%;
        width:21%;
        height:10.5%;
    }

    .custom-text{
        left:32%;
        bottom:1.5%;
        width:40%;
        height:7%;
        font-size:18px;
    }

}

</style>
</head>

<body>

<div class="controls">

    <h2>Valampir bapa ni 202mi janmajayanti poster</h2>

    <input type="file" id="uploadPhoto" accept="image/*">

    <textarea
    id="nameInput"
    placeholder="Enter Name"></textarea>

    <button onclick="downloadPoster()">
        Download Poster
    </button>

</div>


<div class="poster-container" id="capture">

    <!-- POSTER -->

    <img
    id="poster"
    crossorigin="anonymous"
    src="https://i.ibb.co/5x6smz2b/Shree-valampir-dhun-mandal-Valam-dham-gariyadhar-1.jpg">

    <!-- ROUND PHOTO -->

    <div class="photo-frame">

        <img id="previewPhoto">

    </div>

    <!-- TEXT -->

    <div class="custom-text" id="previewText">

        Your Name

    </div>

</div>


<script>

/* IMAGE UPLOAD */

document.getElementById('uploadPhoto')
.addEventListener('change', function(e){

    const file = e.target.files[0];

    if(file){

        const reader = new FileReader();

        reader.onload = function(event){

            document.getElementById('previewPhoto')
            .src = event.target.result;
        }

        reader.readAsDataURL(file);
    }

});


/* TEXT UPDATE */

document.getElementById('nameInput')
.addEventListener('input', function(){

    document.getElementById('previewText')
    .innerText = this.value;

});


/* DOWNLOAD */

function downloadPoster(){

    html2canvas(document.getElementById("capture"),{

        useCORS:true,
        scale:4

    }).then(canvas => {

        const link = document.createElement("a");

        link.download = "202mi janamjayanti.png";

        link.href = canvas.toDataURL("image/png");

        link.click();

    });

}

</script>

</body>
</html>
